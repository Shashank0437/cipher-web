services:
  mongo:
    # MongoDB 5.0+ requires CPU AVX; use 4.4 on older hosts (e.g. HP Z800 / pre-AVX Xeon).
    # On AVX-capable hardware you can switch to mongo:7 (new data dir / dump-restore if upgrading).
    image: mongo:4.4
    ports:
      - "27017:27017"
    volumes:
      - cipherstrike_mongo:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongo --quiet --eval 'quit(db.runCommand({ ping: 1 }).ok ? 0 : 2)'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - cipherstrike_redis:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    # Agent runs on the host (NyxStrike Flask). Use host.docker.internal; set AGENT_MICROSERVICE_URL
    # in server/.env to http://host.docker.internal:8888 and start the agent with NYXSTRIKE_HOST=0.0.0.0.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MONGODB_URI: mongodb://mongo:27017
      REDIS_URL: redis://redis:6379/0
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      PY_API_URL: http://api:8000
      INTERNAL_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  cipherstrike_mongo:
  cipherstrike_redis:
